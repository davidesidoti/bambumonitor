# Bambu Monitor — single-origin nginx config.
# Serves the SPA, proxies /api and /ws to FastAPI, /stream to ustreamer.

server {
    listen 80;
    listen [::]:80;
    server_name bambu.local _;

    root /var/www/bambu-monitor;
    index index.html;

    # Reasonable client limits (the printer never POSTs us anything).
    client_max_body_size 1m;

    # Static SPA: try files, fall back to index.html for client routing.
    location / {
        try_files $uri /index.html;
        add_header Cache-Control "no-cache";
    }

    # Hashed assets are immutable; cache aggressively.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # REST API.
    location /api/ {
        proxy_pass http://127.0.0.1:1111;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # SSE log stream for the in-app updater. Long-lived; no buffering.
    location = /api/settings/update/stream {
        proxy_pass http://127.0.0.1:1111;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # WebSocket. Long-lived; no read timeout, no buffering.
    location /ws {
        proxy_pass http://127.0.0.1:1111;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 1d;
        proxy_send_timeout 1d;
        proxy_buffering off;
    }

    # ustreamer MJPEG stream. Disable buffering so the multipart frames
    # are forwarded to the browser as soon as they arrive.
    location /stream {
        proxy_pass http://127.0.0.1:9999/stream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 1d;
    }

    # Health probe.
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
